services:
  # Backend - FastAPI
  - type: web
    name: xai-football-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.11"

  # Frontend - Streamlit
  - type: web
    name: xai-football-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: BACKEND_URL
        fromService:
          name: xai-football-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
        property: /api
